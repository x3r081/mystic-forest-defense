<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f1a" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Mystic Forest Defense — an arcane tower-defense game. Channel the ancient grove and hold back the creeping dark across 10 levels."
    />

    <!-- Social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mystic Forest Defense" />
    <meta
      property="og:description"
      content="An arcane tower-defense game. Channel the ancient grove and hold back the creeping dark."
    />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Display font for the enchanted-forest art direction -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Mystic Forest Defense</title>

    <!-- Critical, dependency-free boot splash. Shows the instant the page is
         parsed (before the JS bundle downloads) and is faded out by main.tsx
         once the app has mounted. -->
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.6rem;
        background:
          radial-gradient(ellipse at center, #102a1f 0%, #0a0f1a 70%);
        color: #e8fff4;
        font-family: 'Cinzel', 'Trebuchet MS', system-ui, serif;
        text-align: center;
        transition: opacity 0.6s ease;
      }
      #boot-splash.boot-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .boot-orb {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        background: radial-gradient(circle at 50% 40%, #d6fff0, #7ef9c4 35%, #2f7d5b 70%, transparent 72%);
        box-shadow: 0 0 40px rgba(126, 249, 196, 0.55), 0 0 90px rgba(167, 139, 250, 0.35);
        animation: boot-pulse 1.8s ease-in-out infinite;
      }
      .boot-orb::after {
        content: '';
        position: absolute;
        width: 120px;
        height: 120px;
        margin: -18px 0 0 -18px;
        border-radius: 50%;
        border: 2px solid rgba(126, 249, 196, 0.35);
        border-top-color: rgba(126, 249, 196, 0.9);
        animation: boot-spin 1.1s linear infinite;
      }
      .boot-title {
        font-size: clamp(1.5rem, 5vw, 2.4rem);
        font-weight: 800;
        letter-spacing: 0.04em;
        margin: 0;
        text-shadow: 0 0 24px rgba(126, 249, 196, 0.45), 0 0 60px rgba(167, 139, 250, 0.3);
      }
      .boot-sub {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 0.8rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #9fc4b4;
        margin: 0;
      }
      @keyframes boot-pulse {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.08); filter: brightness(1.2); }
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-orb, .boot-orb::after { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="boot-orb"></div>
      <h1 class="boot-title">Mystic Forest Defense</h1>
      <p class="boot-sub">Summoning the grove…</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
